server.port=8080

spring.application.name=antifsad-backend

spring.datasource.url=jdbc:mysql://localhost:3306/antifsad
spring.datasource.username=root
spring.datasource.password=Saich@2889

frontend.url=http://localhost:5173
frontend.url-patterns=http://localhost:5173, http://localhost:5173/*

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
springdoc.swagger-ui.path=/swagger-ui.html

app.security.jwt-secret=AntiFSADDevelopmentJwtSecretKeyMinimum32Bytes2026
app.security.jwt-expiration-ms=86400000













